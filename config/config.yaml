testing:
  sampling:
    measurements_count: 100
    total_duration_seconds: 15
    sampling_frequency_hz: 5

ammeters:
 greenlee:
   port: 5001
   command: "MEASURE_GREENLEE -get_measurement"
   min_current: 0.2
   max_current: 1.3
 entes:
   port: 5002
   command: "MEASURE_ENTES -get_data"
   min_current: 30
   max_current: 120
 circutor:
   port: 5003
   command: "MEASURE_CIRCUTOR -get_measurement -current"
   min_current: 0.015
   max_current: 0.05

analysis:
  statistical_metrics:
  visualization:
    enabled: true
    plot_types:

result_management:
  logs:
